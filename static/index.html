<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>$Carmin Track Telemetry</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body, html, #map { height: 100%; margin: 0; background: #111; }
    #sidebar {
      position: absolute; top: 80px; left: 10px; z-index: 1000;
      background: rgba(20,20,30,0.95); color: white; padding: 15px;
      border-radius: 10px; width: 260px; font-family: system-ui;
      box-shadow: 0 4px 20px rgba(0,0,0,0.7);
    }
    h1 { margin: 0 0 15px 0; font-size: 20px; }
    select { width: 100%; padding: 10px; background: #1e1e2e; border: 1px solid #444; color: white; border-radius: 6px; }
    .stat { margin: 8px 0; font-size: 14px; }
    .value { font-weight: bold; color: #00ff88; }
    .leaflet-top.leaflet-left { top: 10px !important; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>Carmin Track Telemetry</h1>
    <div class="stat">Laps: <span class="value" id="lapCount">—</span></div>
    <label>Show lap:</label>
    <select id="lapSelect"><option value="">All laps</option></select>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map');
    L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png', {
      attribution: '© Stadia Maps'
    }).addTo(map);

    let layers = [];

    fetch('/api/track')
      .then(r => r.json())
      .then(geojson => {
        const features = geojson.features;
        document.getElementById('lapCount').textContent = features.length;

        const select = document.getElementById('lapSelect');
        features.forEach((f, i) => {
          const color = f.properties?.stroke || "#00ffff";
          const layer = L.geoJSON(f, {
            style: { color: color, weight: 4, opacity: 0.9 }
          }).addTo(map);
          layers.push(layer);

          const opt = document.createElement('option');
          opt.value = i; opt.textContent = `Lap ${i+1}`;
          select.appendChild(opt);
        });

        map.fitBounds(L.geoJSON(geojson).getBounds().pad(0.3));
      });

    document.getElementById('lapSelect').onchange = function() {
      layers.forEach((l, i) => {
        const opacity = (this.value === '' || i === +this.value) ? 0.9 : 0.2;
        l.setStyle({ opacity });
      });
    };
  </script>
</body>
</html>
